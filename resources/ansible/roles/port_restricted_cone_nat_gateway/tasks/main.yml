---
- name: define conditional variables
  set_fact:
    ipv4_forwarded: false

- name: check if ipv4 is forwarded
  command: sysctl net.ipv4.ip_forward
  register: ipv4_forward_output

- name: set ipv4_forwarded to true if ipv4 is forwarded
  set_fact:
    ipv4_forwarded: true
  when: ipv4_forward_output.stdout.find('net.ipv4.ip_forward = 1') != -1

- name: enable IPv4 forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: 1
    state: present
    reload: true
  when: not ipv4_forwarded

- name: persist IPv4 forwarding on reboots
  command: sed -i 's/#net.ipv4.ip_forward/net.ipv4.ip_forward/g' /etc/sysctl.conf
  when: not ipv4_forwarded

- name: Retrieve private IP of the corresponding private node vm
  set_fact:
    node_private_ip_eth1: "{{ node_private_ip_map[inventory_hostname] }}"

- name: public IP of the gateway vm
  set_fact:
    gateway_public_ip: "{{ ansible_host }}"

- name: define ephemeral port range
  set_fact:
    ephemeral_start: 1024
    ephemeral_end: 65535

- name: get VPC CIDR for private node droplet
  shell: ip route | grep eth1 | grep kernel | awk '{print $1}' | grep -v default
  register: vpc_cidr_output
  delegate_to: "{{ node_private_ip_eth1 }}"
  become: yes

- name: set VPC CIDR fact
  set_fact:
    private_node_vpc_cidr: "{{ vpc_cidr_output.stdout }}"

- name: check if port restricted cone NAT is already configured
  command: iptables -t nat -L POSTROUTING -v
  register: nat_gateway_output

- name: Load ip_conntrack module
  modprobe:
    name: ip_conntrack
    state: present

- name: set netfilter conntrack max
  sysctl:
    name: net.netfilter.nf_conntrack_max
    value: 1048576
    state: present
    reload: true

- name: ensure netfilter conntrack max is set in sysctl.conf
  lineinfile:
    path: /etc/sysctl.conf
    line: 'net.netfilter.nf_conntrack_max=1048576'
    state: present

- name: flush nat table
  iptables:
    table: nat
    flush: yes
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: flush mangle table
  iptables:
    table: mangle
    flush: yes
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

# Port Restricted Cone NAT Implementation:
# - Outbound traffic creates connection state tracking
# - Inbound traffic allowed only from same IP:port that received outbound traffic
# - Uses conntrack to track established connections

- name: SNAT for outbound traffic from private node (creates connection state)
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ node_private_ip_eth1 }}"
    out_interface: eth0
    protocol: tcp
    source_port: "{{ ephemeral_start }}:{{ ephemeral_end }}"
    jump: SNAT
    to_source: "{{ gateway_public_ip }}:{{ ephemeral_start }}-{{ ephemeral_end }}"
    state: present
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: SNAT for outbound UDP traffic from private node (creates connection state)
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ node_private_ip_eth1 }}"
    out_interface: eth0
    protocol: udp
    source_port: "{{ ephemeral_start }}:{{ ephemeral_end }}"
    jump: SNAT
    to_source: "{{ gateway_public_ip }}:{{ ephemeral_start }}-{{ ephemeral_end }}"
    state: present
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

# DNAT only for ESTABLISHED connections (port restricted behavior)
# This allows inbound traffic only from IP:port combinations that we previously contacted
- name: DNAT for inbound TCP traffic (ESTABLISHED connections only - port restricted)
  command: >
    iptables -t nat -A PREROUTING
    -i eth0
    -d {{ gateway_public_ip }}
    -p tcp
    --dport {{ ephemeral_start }}:{{ ephemeral_end }}
    -m conntrack --ctstate ESTABLISHED
    -j DNAT
    --to-destination {{ node_private_ip_eth1 }}:{{ ephemeral_start }}-{{ ephemeral_end }}
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: DNAT for inbound UDP traffic (ESTABLISHED connections only - port restricted)
  command: >
    iptables -t nat -A PREROUTING
    -i eth0
    -d {{ gateway_public_ip }}
    -p udp
    --dport {{ ephemeral_start }}:{{ ephemeral_end }}
    -m conntrack --ctstate ESTABLISHED
    -j DNAT
    --to-destination {{ node_private_ip_eth1 }}:{{ ephemeral_start }}-{{ ephemeral_end }}
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

# Allow forwarding for established and related connections
- name: Allow forwarding for established and related TCP connections
  iptables:
    chain: FORWARD
    in_interface: eth0
    out_interface: eth1
    destination: "{{ node_private_ip_eth1 }}"
    protocol: tcp
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: Allow forwarding for established and related UDP connections
  iptables:
    chain: FORWARD
    in_interface: eth0
    out_interface: eth1
    destination: "{{ node_private_ip_eth1 }}"
    protocol: udp
    ctstate: ESTABLISHED,RELATED
    jump: ACCEPT
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

# Allow outbound forwarding from private node
- name: Allow outbound forwarding from private node TCP
  iptables:
    chain: FORWARD
    in_interface: eth1
    out_interface: eth0
    source: "{{ node_private_ip_eth1 }}"
    protocol: tcp
    jump: ACCEPT
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: Allow outbound forwarding from private node UDP
  iptables:
    chain: FORWARD
    in_interface: eth1
    out_interface: eth0
    source: "{{ node_private_ip_eth1 }}"
    protocol: udp
    jump: ACCEPT
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

# LAN hairpin NAT for local communication
- name: DNAT for LAN hairpin TCP (ESTABLISHED connections only)
  command: >
    iptables -t nat -A PREROUTING
    -i eth1
    -d {{ gateway_public_ip }}
    -p tcp
    --dport {{ ephemeral_start }}:{{ ephemeral_end }}
    -m conntrack --ctstate ESTABLISHED
    -j DNAT
    --to-destination {{ node_private_ip_eth1 }}:{{ ephemeral_start }}-{{ ephemeral_end }}
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: DNAT for LAN hairpin UDP (ESTABLISHED connections only)
  command: >
    iptables -t nat -A PREROUTING
    -i eth1
    -d {{ gateway_public_ip }}
    -p udp
    --dport {{ ephemeral_start }}:{{ ephemeral_end }}
    -m conntrack --ctstate ESTABLISHED
    -j DNAT
    --to-destination {{ node_private_ip_eth1 }}:{{ ephemeral_start }}-{{ ephemeral_end }}
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: SNAT for LAN hairpin TCP
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ private_node_vpc_cidr }}"
    destination: "{{ node_private_ip_eth1 }}"
    out_interface: eth1
    protocol: tcp
    source_port: "{{ ephemeral_start }}:{{ ephemeral_end }}"
    jump: SNAT
    to_source: "{{ gateway_public_ip }}:{{ ephemeral_start }}-{{ ephemeral_end }}"
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: SNAT for LAN hairpin UDP
  iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ private_node_vpc_cidr }}"
    destination: "{{ node_private_ip_eth1 }}"
    out_interface: eth1
    protocol: udp
    source_port: "{{ ephemeral_start }}:{{ ephemeral_end }}"
    jump: SNAT
    to_source: "{{ gateway_public_ip }}:{{ ephemeral_start }}-{{ ephemeral_end }}"
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1

- name: persist iptables rules to disk
  command: service netfilter-persistent save
  when: nat_gateway_output.stdout.find(node_private_ip_eth1) == -1